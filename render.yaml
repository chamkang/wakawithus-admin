services:
  - type: web
    name: wakawithus-admin
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VERCEL_DEPLOY_HOOK
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_BUCKET
        value: images
